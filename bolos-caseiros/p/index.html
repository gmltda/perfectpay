<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=/bolos-caseiros/">
    <title>Redirecionando...</title>
    <script type="text/javascript">
        // Preserve UTM parameters during redirect
        var currentQuery = window.location.search;
        var destination = "/bolos-caseiros/" + currentQuery;
        window.location.replace(destination);
    </script>
</head>
<body>
    <p>Se você não for redirecionado automaticamente, <a id="redir-link" href="/bolos-caseiros/">clique aqui</a>.</p>
    <script type="text/javascript">
        document.getElementById('redir-link').href = destination;
    </script>
</body>
</html>
